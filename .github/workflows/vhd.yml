name: Send Email via Dispatch

# 1. 定义触发器：监听 repository_dispatch 事件
on:
  repository_dispatch:
    # 这里可以指定一个自定义的事件类型，例如 'send_email'
    # 如果不指定，任何类型的 dispatch 都会触发
    types: [bb]

jobs:
  send_email:
    runs-on: ubuntu-latest
    steps:
      # 必须包含此步骤以获取代码上下文
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 发送邮件步骤（基于你提供的配置）
      - name: Send email
        uses: dawidd6/action-send-mail@v11
        with:
          server_address: smtp.yandex.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ${{ github.event.client_payload.subject || 'Default Subject' }}
          to: ${{ github.event.client_payload.to }}
          from: ${{ github.event.client_payload.from || 'GitHub Action <noreply@github.com>' }}
          body: ${{ github.event.client_payload.body || 'Empty body' }}
